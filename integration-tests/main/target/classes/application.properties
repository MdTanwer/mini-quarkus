# Mini Quarkus Configuration

# Base configuration
greeting.message=Hello from mini-quarkus configuration!
greeting.count=5
greeting.enabled=true

# Profile-specific configuration
%dev.greeting.message=Hello from dev profile!
%prod.greeting.message=Hello from production!
%test.greeting.message=Hello from test environment!

# Datasource configuration — mirrors quarkus.datasource.jdbc.url
# DB_CLOSE_DELAY=-1 keeps H2 in-memory database alive across connections
# DB_CLOSE_ON_EXIT=FALSE prevents H2 from closing on JVM exit hook (useful for tests)
# Same keys as Quarkus: quarkus.datasource.* (mini.datasource.* also supported in mini-quarkus)
quarkus.datasource.jdbc.url=jdbc:h2:mem:minidb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=

# Flyway — default off for dev; set true and add classpath:db/migration for SQL migrations
quarkus.flyway.migrate-at-start=false
quarkus.flyway.locations=classpath:db/migration

# Hibernate ORM — maps to quarkus.hibernate-orm in real Quarkus
quarkus.hibernate-orm.database.generation=update
